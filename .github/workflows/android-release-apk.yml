name: Build Android Release APK

on:
  workflow_dispatch:

jobs:
  build-android-release-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_ENV: production
      EXPO_PUBLIC_API_URL: https://api.getoneto.com
      API_SSL_PIN_PRIMARY: ${{ secrets.API_SSL_PIN_PRIMARY }}
      API_SSL_PIN_BACKUP: ${{ secrets.API_SSL_PIN_BACKUP }}
      API_SSL_PIN_EXTRA: ${{ secrets.API_SSL_PIN_EXTRA }}
      ONETO_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ONETO_UPLOAD_KEYSTORE_BASE64 }}
      ONETO_UPLOAD_STORE_PASSWORD: ${{ secrets.ONETO_UPLOAD_STORE_PASSWORD }}
      ONETO_UPLOAD_KEY_ALIAS: ${{ secrets.ONETO_UPLOAD_KEY_ALIAS }}
      ONETO_UPLOAD_KEY_PASSWORD: ${{ secrets.ONETO_UPLOAD_KEY_PASSWORD }}
      ORG_GRADLE_PROJECT_newArchEnabled: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @oneto/shared build

      - name: Validate production secrets
        run: |
          test -n "$API_SSL_PIN_PRIMARY"
          test -n "$API_SSL_PIN_BACKUP"
          test -n "$ONETO_UPLOAD_KEYSTORE_BASE64"
          test -n "$ONETO_UPLOAD_STORE_PASSWORD"
          test -n "$ONETO_UPLOAD_KEY_ALIAS"
          test -n "$ONETO_UPLOAD_KEY_PASSWORD"

      - name: Decode Android release keystore
        working-directory: mobile/android/app
        run: |
          echo "$ONETO_UPLOAD_KEYSTORE_BASE64" | base64 --decode > oneto-upload.keystore

      - name: Make Gradle wrapper executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Build Android release APK
        working-directory: mobile/android
        env:
          ONETO_UPLOAD_STORE_FILE: oneto-upload.keystore
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneto-android-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
