name: Build Android Development APK

on:
  workflow_dispatch:

jobs:
  build-android-dev-apk:
    name: Build Android dev APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_API_URL: https://api.getoneto.com
      ORG_GRADLE_PROJECT_newArchEnabled: "false"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @oneto/shared build

      - name: Make Gradle wrapper executable
        working-directory: mobile/android
        run: chmod +x ./gradlew

      - name: Build Android debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a --no-daemon --stacktrace --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneto-android-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
